  <!-- Hero -->
  <text x="40" y="160" font-family="sans-serif" font-weight="700" font-size="38" fill="#0F172A">Healthcare that</text>
  <text x="40" y="208" font-family="sans-serif" font-weight="700" font-size="38" fill="#0EA5E9">feels personal.</text>
  <text x="40" y="248" font-family="sans-serif" font-size="14" fill="#475569">Same-day appointments for Gulf Coast families.</text>
  <rect x="40" y="270" width="150" height="44" rx="22" fill="#0EA5E9"/>
  <text x="115" y="297" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="13" fill="#FFFFFF">Find a Doctor</text>
  <!-- Right card with doctor placeholder -->
  <rect x="460" y="100" width="300" height="280" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
  <circle cx="610" cy="200" r="60" fill="#E2E8F0"/>
  <circle cx="610" cy="180" r="22" fill="#94A3B8"/>
  <path d="M 560 240 Q 610 215 660 240 L 660 270 L 560 270 Z" fill="#94A3B8"/>
  <text x="610" y="300" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="15" fill="#0F172A">Dr. Anita Reyes, MD</text>
  <text x="610" y="320" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748B">Family Medicine</text>
  <rect x="500" y="340" width="220" height="32" rx="16" fill="#0EA5E9"/>
  <text x="610" y="361" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="12" fill="#FFFFFF">Schedule a Visit</text>
  <!-- Service tiles -->
  <rect x="40"  y="430" width="190" height="80" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
  <rect x="250" y="430" width="190" height="80" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
  <rect x="460" y="430" width="190" height="80" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
  <rect x="60"  y="450" width="32" height="6" rx="3" fill="#0EA5E9"/>
  <rect x="60"  y="468" width="120" height="6" rx="3" fill="#94A3B8"/>
  <rect x="60"  y="482" width="80"  height="6" rx="3" fill="#94A3B8"/>
  <rect x="270" y="450" width="32" height="6" rx="3" fill="#0EA5E9"/>
  <rect x="270" y="468" width="120" height="6" rx="3" fill="#94A3B8"/>
  <rect x="270" y="482" width="80"  height="6" rx="3" fill="#94A3B8"/>
  <rect x="480" y="450" width="32" height="6" rx="3" fill="#0EA5E9"/>
