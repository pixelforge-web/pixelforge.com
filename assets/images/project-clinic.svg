<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="mg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4F7FB"/>
      <stop offset="100%" stop-color="#E1E9F2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="550" fill="url(#mg)"/>
  <!-- Nav -->
  <rect x="0" y="0" width="800" height="64" fill="#FFFFFF"/>
  <circle cx="40" cy="32" r="14" fill="#0EA5E9"/>
  <rect x="34" y="26" width="12" height="12" fill="#FFFFFF"/>
  <rect x="36" y="28" width="8" height="8" fill="#0EA5E9"/>
  <text x="66" y="38" font-family="sans-serif" font-weight="700" font-size="18" fill="#0F172A">Bayside Family Clinic</text>
  <rect x="600" y="20" width="180" height="32" rx="16" fill="#0EA5E9"/>
  <text x="690" y="40" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="13" fill="#FFFFFF">Book Appointment</text>
